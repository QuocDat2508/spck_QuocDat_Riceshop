<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quốc Đạt Rice Shop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-seedling"></i>
                    <span>QUOCDAT <span>RICE</span></span>
                </div>
                <h2>Chào mừng trở lại!</h2>
                <p>Mua gạo sạch, giao tận nhà nhanh chóng</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email của bạn" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Mật khẩu" required>
                </div>
                <div class="form-options">
                    <label style="cursor: pointer;"><input type="checkbox"> Ghi nhớ</label>
                    <a href="#">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
            </form>

            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <!-- Logic Xử lý Đăng Nhập -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            // Lấy dữ liệu từ localStorage (giả lập file JSON)
            const users = JSON.parse(localStorage.getItem('users')) || [];

            // Tìm kiếm người dùng khớp email và mật khẩu
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                // Lưu thông tin người dùng vào sessionStorage để đánh dấu đã đăng nhập
                sessionStorage.setItem('currentUser', JSON.stringify(user));
                alert("Đăng nhập thành công! Chào mừng " + user.fullname);
                window.location.href = "index.html"; // Chuyển về trang chủ
            } else {
                alert("Email hoặc mật khẩu không chính xác!");
            }
        });
    </script>
</body>
</html>
